# MeshForge repo profile — https://meshforge.org
# Narrows the tag and target pickers when this repo is opened in MeshForge.
meshforge:
  tags:
    include: "^lotato-.*"
  require_capabilities: [wifi]
  platforms:
    meshcore:
      targets:
        include: "_repeater$"
    meshtastic:
      tags:
        include: ".*"
